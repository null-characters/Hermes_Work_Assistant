# ===========================================
# Hermes Work Assistant - 本地化方案 (Phase 3)
# ===========================================
# 服务编排配置
#
# 核心服务：
# - hermes-bridge (8646): 任务提交 API，本地 REST 接口
# - hermes-agent (8645): LLM Agent 核心，通过 docker exec 调用
# - web-ui (8501): Streamlit 前端，支持多文件上传和结果预览
# - prometheus (9090): 监控面板
# - nginx-proxy (80/443): 反向代理（可选）
#
# Phase 3 新功能：
# - CORS 配置：通过 CORS_ORIGINS 环境变量控制
# - 文件大小限制：MAX_FILE_SIZE_MB 环境变量（默认 50MB）
# - 批量处理：支持多文件上传和打包下载
# - 处理模板：预设模板快速处理常见任务
# - 结果预览：Excel/CSV 表格预览、图片预览
#
# 已移除服务（Phase 2 简化）：
# - minio: 对象存储 → 改用本地文件系统
# - file-upload: 文件服务 → 改用 session_manager 模块
#
# 使用方式：
#   docker compose up -d           # 启动所有服务
#   docker compose ps              # 查看状态
#   curl http://localhost:8646/health  # 健康检查
#
# 详细指南：docs/LOCAL_DEV_GUIDE.md

services:
  # Nginx 反向代理 - HTTPS 终止
  nginx-proxy:
    image: nginx:alpine
    container_name: hermes-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - hermes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Hermes Bridge - 本地桥接服务
  hermes-bridge:
    build:
      context: ./services/hermes-bridge
      dockerfile: Dockerfile
    container_name: hermes-bridge
    ports:
      - "8646:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # 需要访问 Docker
      - ./data:/app/data  # T02-13: 本地文件存储
    env_file:
      - .env
    environment:
      - HERMES_CONTAINER_NAME=hermes-agent
      - HERMES_TIMEOUT=300
      - SESSION_BASE_PATH=/app/data/sessions  # 会话目录
      # Phase 3 配置
      - CORS_ORIGINS=${CORS_ORIGINS:-*}  # CORS 允许的源，逗号分隔
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}  # 文件大小限制 (MB)
    depends_on:
      - hermes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Hermes Agent - 核心 AI 引擎
  hermes:
    image: nousresearch/hermes-agent:main
    container_name: hermes-agent
    ports:
      - "8645:8645"
    volumes:
      - ./config:/root/.hermes  # 本地配置（技能等）
      - ./data:/app/data  # T02-13: 本地文件存储
      # Docker Socket 已移除 - Agent 不需要 Docker 权限 (T02-01)
      - ./config/hermes-config.yaml:/opt/data/config.yaml:ro  # 覆盖 Hermes 内置配置
    env_file:
      - .env
    environment:
      # LLM 配置（覆盖内置配置）
      - HERMES_INFERENCE_PROVIDER=${HERMES_PROVIDER:-custom}
      - HERMES_MODEL=${HERMES_MODEL:-glm-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # 安全配置 (P0)
      - TERMINAL_NETWORK_DISABLED=${TERMINAL_NETWORK_DISABLED:-true}
      - TERMINAL_TIMEOUT=${TERMINAL_TIMEOUT:-300}
      - TERMINAL_READ_ONLY_ROOT=${TERMINAL_READ_ONLY_ROOT:-true}
      - TERMINAL_MAX_PROCESSES=${TERMINAL_MAX_PROCESSES:-100}
      - TERMINAL_CONTAINER_CPU=${TERMINAL_CONTAINER_CPU:-1}
      - TERMINAL_CONTAINER_MEMORY=${TERMINAL_CONTAINER_MEMORY:-2048}
      # 会话目录路径
      - SESSION_BASE_PATH=/app/data/sessions
    command: ["tail", "-f", "/dev/null"]  # 保持容器运行，等待命令
    restart: unless-stopped

  # Prometheus - 监控告警
  prometheus:
    image: prom/prometheus:latest
    container_name: hermes-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web UI - Streamlit 前端 (T02-29)
  web-ui:
    build:
      context: ./services
      dockerfile: web-ui/Dockerfile
    container_name: hermes-web-ui
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - BRIDGE_API_URL=http://hermes-bridge:8000
      - SESSION_BASE_PATH=/app/data/sessions
    depends_on:
      - hermes-bridge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kingdee MCP Server - ERP 集成 (Phase 4)
  kingdee-mcp-server:
    build:
      context: ./services/kingdee-mcp-server
      dockerfile: Dockerfile
    container_name: hermes-mcp-server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config/mcp_servers.yaml:/app/config/mcp_servers.yaml:ro
    env_file:
      - .env
    environment:
      - AUDIT_LOG_DIR=/app/data/audit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  # WeChat Gateway - 企业微信网关 (Phase 4)
  wechat-gateway:
    build:
      context: ./services/wechat-gateway
      dockerfile: Dockerfile
    container_name: hermes-wechat-gateway
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - HERMES_AGENT_URL=http://hermes-bridge:8000
      - PORT=8001
    depends_on:
      - hermes-bridge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DingTalk Gateway - 钉钉群机器人网关
  dingtalk-gateway:
    build:
      context: ./services/dingtalk-gateway
      dockerfile: Dockerfile
    container_name: hermes-dingtalk-gateway
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - PORT=8002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
